name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          DRAFT: ${{ github.event.inputs.draft == 'true' }}
        run: |
          TAG="nafaq-v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi

          if [ "$DRAFT" = "true" ]; then
            gh release create "$TAG" --title "Nafaq v${VERSION}" --notes "## Nafaq v${VERSION}" --draft
          else
            gh release create "$TAG" --title "Nafaq v${VERSION}" --notes "## Nafaq v${VERSION}"
          fi

  publish-desktop:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x64
          - platform: ubuntu-22.04
            args: ""
            arch: x64
          - platform: windows-latest
            args: ""
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        with:
          tagName: ${{ needs.create-release.outputs.tag }}
          releaseName: Nafaq v${{ needs.create-release.outputs.version }}
          releaseBody: ""
          releaseDraft: ${{ needs.create-release.outputs.draft == 'true' }}
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment: Main
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: android-arm64

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"

      - name: Export Android environment variables
        run: |
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Initialize Android project (if missing)
        run: test -d src-tauri/gen/android || bun run tauri android init

      - name: Setup Android signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_STORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          cd src-tauri/gen/android/app
          echo "$ANDROID_KEY_BASE64" | base64 -d > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> keystore.properties
          echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties

      - name: Build Android APK (release)
        run: bun run tauri android build
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'

      - name: Upload Android artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(find src-tauri/gen/android -path "*outputs*" -name "*release*.apk" ! -name "*unsigned*" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -path "*outputs*" -name "*release*.apk" | head -1)
          fi
          AAB=$(find src-tauri/gen/android -path "*outputs*" -name "*.aab" | head -1)
          TAG="${{ needs.create-release.outputs.tag }}"

          if [ -n "$APK" ]; then
            gh release upload "$TAG" "$APK" --clobber || echo "APK upload failed"
          fi
          if [ -n "$AAB" ]; then
            gh release upload "$TAG" "$AAB" --clobber || echo "AAB upload failed"
          fi
