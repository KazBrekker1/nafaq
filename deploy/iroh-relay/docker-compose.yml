services:
  iroh-relay:
    image: n0computer/iroh-relay:latest
    restart: unless-stopped
    labels:
      - traefik.enable=false
    ports:
      - "${RELAY_HTTPS_PORT:-443}:443"
      - "${RELAY_HTTP_PORT:-80}:80"
      - "${RELAY_QUIC_PORT:-7842}:7842/udp"
      - "${RELAY_METRICS_PORT:-9090}:9090"
    volumes:
      - certs:/data/certs
      - type: bind
        source: ./relay-config.toml
        target: /etc/iroh-relay/config.toml
    command: ["--config-path", "/etc/iroh-relay/config.toml"]
    environment:
      RUST_LOG: info

volumes:
  certs:
