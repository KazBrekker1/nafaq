services:
  iroh-relay:
    image: n0computer/iroh-relay:latest
    restart: unless-stopped
    labels:
      - traefik.enable=false
    ports:
      - "${RELAY_HTTPS_PORT:-443}:443"
      - "${RELAY_HTTP_PORT:-80}:80"
      - "${RELAY_QUIC_PORT:-7842}:7842/udp"
      - "${RELAY_METRICS_PORT:-9090}:9090"
    volumes:
      - certs:/data/certs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/relay.toml <<'EOF'
        enable_relay = true
        http_bind_addr = "[::]:80"
        enable_quic_addr_discovery = true
        enable_metrics = true
        metrics_bind_addr = "[::]:9090"

        [limits]
        accept_conn_limit = 1000.0
        accept_conn_burst = 10000

        [[limits.client]]
        rate_limit_bytes = 10485760
        burst_allowance = 52428800

        [tls]
        cert_mode = "LetsEncrypt"
        hostname = "iroh-relay.sanad.ink"
        contact = "yousseif.elshahawy@proton.me"
        prod_tls = true
        cert_dir = "/data/certs"
        EOF
        exec /iroh-relay --config-path /tmp/relay.toml
    environment:
      RUST_LOG: info

volumes:
  certs:
