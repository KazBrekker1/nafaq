services:
  iroh-relay:
    image: n0computer/iroh-relay:latest
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_IROHRELAY_3340
      - RUST_LOG=info
    ports:
      - "7842:7842/udp"
    command: ["--dev"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3340/generate_204 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  certs:
